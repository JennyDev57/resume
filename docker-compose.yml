services:
  resume-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: resume-live-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # Empêche d'écraser les modules du conteneur par ceux du PC
    environment:
      - CHOKIDAR_USEPOLLING=true # Utile pour s'assurer que Docker voit bien les changements
    restart: unless-stopped
